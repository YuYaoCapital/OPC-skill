<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公募基金周度报告</title>
  <style>
    :root {
      --primary: #1e3a5f;
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --text: #333333;
      --text-secondary: #666666;
      --up: #e74c3c;
      --down: #27ae60;
      --border: #e8e8e8;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding-bottom: 40px;
    }
    header {
      background: linear-gradient(135deg, var(--primary) 0%, #2c5282 100%);
      color: #fff;
      padding: 32px 24px;
      text-align: center;
    }
    header h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    header .subtitle { font-size: 14px; opacity: 0.9; }
    main { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
    .section-title {
      font-size: 16px; font-weight: 600; color: var(--primary);
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }
    .report-list { list-style: none; }
    .report-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px; border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .report-item:hover { background: #f8f9fa; }
    .report-item:last-child { border-bottom: none; }
    .report-info { flex: 1; }
    .report-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .report-meta { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .report-link {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--primary); color: #fff;
      padding: 8px 16px; border-radius: 6px;
      font-size: 13px; text-decoration: none;
      transition: opacity 0.2s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      min-height: 36px;
    }
    .report-link:hover { opacity: 0.85; }
    .badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px; margin-left: 8px;
    }
    .badge-new { background: #e8f5e9; color: #2e7d32; }
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }
    footer {
      max-width: 720px; margin: 0 auto; padding: 24px 16px;
      font-size: 11px; color: #999; text-align: center;
    }
    @media (max-width: 600px) {
      .report-item { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>公募基金报告中心</h1>
    <div class="subtitle">周度陪伴 · 周度回顾 · 融合报告</div>
  </header>

  <main>
    <section id="reports">
      <div class="section-title">📋 报告列表</div>
      <div class="card">
        <ul class="report-list" id="report-list">
          <!-- 报告列表将通过 JS 动态加载 -->
        </ul>
        <div class="empty-state" id="empty-state" style="display: none;">
          <div class="icon">📂</div>
          <p>暂无报告，请稍后再来查看</p>
        </div>
      </div>
    </section>

    <section id="info">
      <div class="section-title">ℹ️ 关于</div>
      <div class="card" style="font-size: 13px; color: var(--text-secondary); line-height: 1.8;">
        <p>本页面展示 公募基金报告中心。</p>
        <p>报告类型：PDF+HTML。</p>
        <p>数据来源：天天基金、同花顺iFinD、东方财富Choice。</p>
        <p style="margin-top: 12px; font-size: 12px; color: #999;">
          更新日期：<span id="update-date">2026-07-10</span>（数据截至上周五）
        </p>
      </div>
    </section>
  </main>

  <footer>
    <p>本材料仅供陪伴服务使用，不构成投资建议。市场有风险，投资需谨慎。</p>
    <p>部署平台：Cloudflare Pages</p>
  </footer>

  <script>
    // 移动端检测
try { var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0; } catch(e) { var isTouch = false; }

    // 扫描 reports 目录下的报告文件
    async function loadReports() {
      const listEl = document.getElementById('report-list');
      const emptyEl = document.getElementById('empty-state');

      // 预置报告列表（实际部署时可通过 Cloudflare Functions 扫描目录）
      // 这里使用静态列表，每次生成报告后更新此数组
      const reports = [
        { name: '富国创新科技混合A 周度回顾', update_date: '2026-07-10', file: 'reports/富国创新科技混合A_周度回顾.html', pdf: 'reports/富国创新科技混合A_周度回顾.pdf', tag: '回顾' },
        { name: '富国全球科技互联网股票(QDII)A 周度回顾', update_date: '2026-07-10', file: 'reports/富国全球科技互联网股票(QDII)A_周度回顾.html', pdf: 'reports/富国全球科技互联网股票(QDII)A_周度回顾.pdf', tag: '回顾' },
        { name: '创金合信专精特新股票发起A 周度回顾', update_date: '2026-07-10', file: 'reports/创金合信专精特新股票发起A_周度回顾.html', pdf: 'reports/创金合信专精特新股票发起A_周度回顾.pdf', tag: '回顾' },
        { name: '汇安成长优选混合A 周度回顾', update_date: '2026-07-10', file: 'reports/汇安成长优选混合A_周度回顾.html', pdf: 'reports/汇安成长优选混合A_周度回顾.pdf', tag: '回顾' },
        { name: '汇添富新睿精选混合A 周度回顾', update_date: '2026-07-10', file: 'reports/汇添富新睿精选混合A_周度回顾.html', pdf: 'reports/汇添富新睿精选混合A_周度回顾.pdf', tag: '回顾' },
        { name: '惠升均衡回报混合发起A 周度回顾', update_date: '2026-07-10', file: 'reports/惠升均衡回报混合发起A_周度回顾.html', pdf: 'reports/惠升均衡回报混合发起A_周度回顾.pdf', tag: '回顾' },
        { name: '易方达科讯混合 周度回顾', update_date: '2026-07-10', file: 'reports/易方达科讯混合_周度回顾.html', pdf: 'reports/易方达科讯混合_周度回顾.pdf', tag: '回顾' },
        { name: '永赢先锋半导体智选混合发起A 周度回顾', update_date: '2026-07-10', file: 'reports/永赢先锋半导体智选混合发起A_周度回顾.html', pdf: 'reports/永赢先锋半导体智选混合发起A_周度回顾.pdf', tag: '回顾' },
        { name: '中欧景气精选混合A 周度回顾', update_date: '2026-07-10', file: 'reports/中欧景气精选混合A_周度回顾.html', pdf: 'reports/中欧景气精选混合A_周度回顾.pdf', tag: '回顾' },
        { name: '中欧港股通科技混合发起A 周度回顾', update_date: '2026-07-10', file: 'reports/中欧港股通科技混合发起A_周度回顾.html', pdf: 'reports/中欧港股通科技混合发起A_周度回顾.pdf', tag: '回顾' },
        { name: '睿远成长价值混合A 周度回顾', update_date: '2026-07-10', file: 'reports/睿远成长价值混合A_周度回顾.html', pdf: 'reports/睿远成长价值混合A_周度回顾.pdf', tag: '回顾' },
      ];

      if (reports.length === 0) {
        listEl.style.display = 'none';
        emptyEl.style.display = 'block';
        return;
      }

      // 按更新日期倒序
      reports.sort((a, b) => (b.update_date || '').localeCompare(a.update_date || ''));

      listEl.innerHTML = reports.map((r, i) => {
        // 移动端：使用 window.open 替代 target="_blank"，避免部分浏览器/企微中不跳转
        var linkAttr = isTouch ? '' : 'target="_blank"';
        var htmlLink = '<a class="report-link" href="' + r.file + '"' + (linkAttr ? ' ' + linkAttr : '') + '>查看 HTML →</a>';
        var pdfLink = r.pdf ? '<a class="report-link" href="' + r.pdf + '"' + (linkAttr ? ' ' + linkAttr : '') + ' style="background:#6d0814;">查看 PDF →</a>' : '';
        return `
        <li class="report-item">
          <div class="report-info">
            <div class="report-name">
              ${r.name}
              ${i === 0 ? '<span class="badge badge-new">最新</span>' : ''}
              ${r.tag ? '<span class="badge" style="background:#e3f2fd;color:#1565c0;">' + r.tag + '</span>' : ''}
            </div>
            <div class="report-meta">更新日期：${r.update_date || r.date}</div>
          </div>
          <div class="report-actions" style="display:flex;gap:8px;flex-shrink:0;">
            ${htmlLink}
            ${pdfLink}
          </div>
        </li>
      `}).join('');

      // 移动端点击事件委托：企微内置浏览器拦截 window.open，改用 location.href 当前页跳转
      if (isTouch) {
        listEl.addEventListener('click', function(e) {
          var a = e.target.closest('a.report-link');
          if (a) { e.preventDefault(); window.location.href = a.href; }
        });
      }
      if (isTouch) {
        listEl.addEventListener('click', function(e) {
          var a = e.target.closest('a.report-link');
          if (a) { e.preventDefault(); window.open(a.href); }
        });
      }
    }

    // 更新日期已固定为数据截至日（上周五）
    // document.getElementById('update-date').textContent = '2026-07-10';

    loadReports();
  </script>
</body>
</html>
